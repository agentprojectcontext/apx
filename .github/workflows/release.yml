name: Release

on:
    push:
        branches: [main]

permissions:
    id-token: write
    pull-requests: write
    contents: write
    issues: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org/
                  # This job uses npm. Root package.json declares pnpm only so the
                  # Pages workflow's action-setup can read it; setup-node@v5 would
                  # otherwise auto-detect pnpm for caching and fail (pnpm isn't
                  # installed in this job). Disable the v5 default package cache.
                  package-manager-cache: false

            # --legacy-peer-deps: opentui-spinner@0.0.6 pins @opentui/core@^0.1.49
            # but the project uses ^0.2.8; without this flag npm 10+ refuses
            # with ERESOLVE. Removing opentui-spinner would also work but it
            # is used by the new TUI.
            - run: npm install --legacy-peer-deps
            - run: npm run test
            - run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
