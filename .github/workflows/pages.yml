name: Deploy site to GitHub Pages

# Publishes TWO things to one GitHub Pages site:
#   /apx/        → landing.html (the site's index)
#   /apx/docs/   → the Astro Starlight docs (built from ./docs)
# so the docs live at https://agentprojectcontext.github.io/apx/docs/ and the
# landing links to them. (The repo's root index.html is the web-admin SPA —
# Vite needs it there, it is NOT published here.)
# One-time setup: Repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'landing.html'
      - 'assets/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      # pnpm is only used by the docs subproject, so its version lives in
      # docs/package.json's "packageManager" field — read it from there.
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: docs/package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22 # Astro 6 requires Node >=22.12.0
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Build docs (Astro Starlight, base=/apx/docs)
        working-directory: docs
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Assemble static site
        run: |
          mkdir -p _site/assets
          # landing.html is served as / (the site's index).
          cp landing.html _site/index.html
          touch _site/.nojekyll
          # Only the assets the landing references.
          cp assets/logo.png            _site/assets/ 2>/dev/null || true
          cp assets/hero.png            _site/assets/ 2>/dev/null || true
          cp assets/preview-*.webm      _site/assets/ 2>/dev/null || true
          # Favicons — same vibrant mark as the web admin (adaptive light/dark).
          cp -R assets/favicon          _site/assets/ 2>/dev/null || true
          # Docs build → /apx/docs/ (base path is baked in by Astro).
          mkdir -p _site/docs
          cp -R docs/dist/.             _site/docs/

      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
