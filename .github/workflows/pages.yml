name: Deploy landing to GitHub Pages

# Publishes landing.html (+ the assets it needs) to GitHub Pages as the
# site's index.html, so the landing is viewable at
# https://agentprojectcontext.github.io/apx/
# (The repo's root index.html is the web-admin SPA — Vite needs it there.)
# One-time setup: Repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'landing.html'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site/assets
          # landing.html is served as / (the site's index).
          cp landing.html _site/index.html
          touch _site/.nojekyll
          # Only the assets the landing references.
          cp assets/logo.png            _site/assets/ 2>/dev/null || true
          cp assets/hero.png            _site/assets/ 2>/dev/null || true
          cp assets/preview-*.webm      _site/assets/ 2>/dev/null || true

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
